<svg width="900" height="190" viewBox="0 0 900 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0F1E"/>
      <stop offset="1" stop-color="#0E1628"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <rect width="900" height="190" rx="16" fill="url(#pbg)" stroke="#1E2A44" stroke-width="1.5"/>

  <text x="40" y="42" font-family="Consolas, Menlo, monospace" font-size="14" fill="#64748B">// how I build — retrieval-augmented generation in production</text>

  <!-- Connection line -->
  <path id="flow" d="M120 110 H780" stroke="#1E2A44" stroke-width="3"/>
  <path d="M120 110 H780" stroke="url(#pipe)" stroke-width="3" stroke-dasharray="6 14" opacity="0.8">
    <animate attributeName="stroke-dashoffset" values="0;-80" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Traveling pulse -->
  <circle r="6" fill="#F8FAFC">
    <animateMotion dur="4s" repeatCount="indefinite" path="M120 110 H780"/>
    <animate attributeName="fill" values="#22D3EE;#38BDF8;#F59E0B;#F59E0B" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Nodes -->
  <g font-family="'Segoe UI', Arial, sans-serif" text-anchor="middle">
    <!-- Docs -->
    <rect x="70" y="85" width="100" height="50" rx="10" fill="#0B1120" stroke="#22D3EE" stroke-width="1.5"/>
    <text x="120" y="106" font-size="14" font-weight="700" fill="#E2E8F0">Documents</text>
    <text x="120" y="124" font-size="11" fill="#64748B">PDF · images · 32 langs</text>

    <!-- Chunk + Embed -->
    <rect x="240" y="85" width="110" height="50" rx="10" fill="#0B1120" stroke="#38BDF8" stroke-width="1.5"/>
    <text x="295" y="106" font-size="14" font-weight="700" fill="#E2E8F0">Chunk + Embed</text>
    <text x="295" y="124" font-size="11" fill="#64748B">tiktoken pipelines</text>

    <!-- Vector store -->
    <rect x="420" y="85" width="100" height="50" rx="10" fill="#0B1120" stroke="#818CF8" stroke-width="1.5"/>
    <text x="470" y="106" font-size="14" font-weight="700" fill="#E2E8F0">ChromaDB</text>
    <text x="470" y="124" font-size="11" fill="#64748B">~99% retrieval</text>

    <!-- LLM -->
    <rect x="590" y="85" width="100" height="50" rx="10" fill="#0B1120" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="640" y="106" font-size="14" font-weight="700" fill="#E2E8F0">LLM</text>
    <text x="640" y="124" font-size="11" fill="#64748B">Claude · GPT · vLLM</text>

    <!-- Answer -->
    <rect x="740" y="85" width="110" height="50" rx="10" fill="#0B1120" stroke="#22C55E" stroke-width="1.5"/>
    <text x="795" y="106" font-size="14" font-weight="700" fill="#E2E8F0">Answer</text>
    <text x="795" y="124" font-size="11" fill="#64748B">structured output</text>
  </g>

  <!-- Bottom caption -->
  <text x="450" y="170" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="12" fill="#475569">served with FastAPI · queued with RabbitMQ · shipped in Docker</text>
</svg>
