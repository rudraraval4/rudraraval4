<svg width="900" height="150" viewBox="0 0 900 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Let's build something stellar">
  <defs>
    <radialGradient id="fspace" cx="0.5" cy="0.9" r="1.2">
      <stop offset="0" stop-color="#12042E"/>
      <stop offset="1" stop-color="#030014"/>
    </radialGradient>
    <linearGradient id="faurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00F5D4"/>
      <stop offset="0.35" stop-color="#4CC9F0"/>
      <stop offset="0.7" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#7B2FF7"/>
    </linearGradient>
    <filter id="fblur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="fglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="fframe"><rect width="900" height="150" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#fframe)">
  <rect width="900" height="150" rx="16" fill="url(#fspace)"/>

  <!-- aurora glow rising from horizon -->
  <ellipse cx="450" cy="160" rx="480" ry="60" fill="url(#faurora)" opacity="0.35" filter="url(#fblur)">
    <animate attributeName="opacity" values="0.35;0.55;0.35" dur="6s" repeatCount="indefinite"/>
  </ellipse>

  <!-- stars -->
  <g fill="#E2E8F0">
    <circle cx="90" cy="34" r="1.1"><animate attributeName="opacity" values="1;0.3;1" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="58" r="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="390" cy="28" r="1"><animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="50" r="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="690" cy="30" r="1.1"><animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="830" cy="56" r="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.7s" repeatCount="indefinite"/></circle>
  </g>

  <text x="450" y="72" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="21" font-weight="700" fill="#F8FAFC" filter="url(#fglow)">✦ Let's build something <tspan fill="url(#faurora)">stellar</tspan> ✦</text>
  <text x="450" y="102" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="13" fill="#8B7EC8">open to AI/LLM engineering opportunities — ship it to production, or it doesn't count</text>

  <!-- horizon line -->
  <rect x="0" y="146" width="900" height="4" fill="url(#faurora)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="4s" repeatCount="indefinite"/>
  </rect>
  </g>
</svg>
